<!DOCTYPE html>
<html lang="en">
    <head>
        <title>DLA</title>

        <meta charset="utf-8">
        <meta name="author" content="h0sh1z0ra">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="ico.png" type="image/x-icon">
    </head>


    <style>
        body {
            background-image: url("background.jpg");
            background-size: cover;
            /* background-repeat: no-repeat; */
        }

        h1 {
            color: white;
        }

        h2 {
            color: white;
            font-size: 200%;

            margin: 0px;
        }

        .app {
            display:flex;
            align-items: flex-start;
        }

        .controls {
            display: flex;
            flex-direction: column;

            gap: 15px;
        }

        .label {
            /* display: flex;
            flex-direction: column; */

            font-family: MS-Gothic;
            font-size: 12px;
            font-weight: bold;

            color:white;
        }

        .slider {
            accent-color: #5ad1e8;
            width: 200px;
        }

        button.active {
            border: 2px solid rgb(3, 239, 3);
        }

        button {
            background-color: rgba(184, 184, 184, 0.5);

            color: black;

            border: 2px solid red;
            border-radius: 6px;
            padding: 8px 16px;
            
            cursor: pointer;
        }

        button:hover { 
            background-color: #b3f0f9;
        }

        .canvas-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .canvas-layers {
            position: relative;

            /* background-image: url("background.jpg");
            background-size: cover; */
            background-color: rgb(0, 75, 132);

            left: 10px;
            border: 2px solid white;
            border-radius: 10px;


            width: 800px;
            height: 600px;
        }

        .canvas-layers canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .canvas-area .counters {
            color: white;
            position: absolute;

            padding: 5px;
            
            top: 8px;
            left: 8px;
        }

        .prob {
            display: flex;
            flex-direction: column;

            border: 2px solid white;
            padding: 5px;
            border-radius: 10px;
        }

        .sim-speed {
            display: flex;
            flex-direction: column;

            border: 2px solid white;
            padding: 5px;
            border-radius: 10px;
        }

        .bias {
            display: flex;
            flex-direction: column;

            border: 2px solid white;
            gap: 5px;
            padding: 5px;
            border-radius: 10px;
        }

        .bias-buttons {
            display: flex;
            
            margin: 0px;
        }

        .misc-buttons {
            display: flex;
            
            margin: 5px;
        }

        .misc {
            border: 2px solid white;
            padding: 5px;
            border-radius: 10px;
        }

    </style>

    <body>

        <h1>Diffusion-Limited Aggregation</h1>
        
        <div class="app">
            <div class="controls">
                <h2>Controls</h2>
                <div class="prob">
                    <label class="label">Nearest Sticking Prob.: <span class="slider-label" id="pnnValue">1</span></label>
                    <input autocomplete="off" class="slider" type="range" id="pnnSlider" min="0" max="1" step="0.05" value="1">

                    <label class="label">Second Nearest Sticking Prob.: <span class="slider-label" id="psnnValue">0</span></label>
                    <input autocomplete="off" class="slider" type="range" id="psnnSlider" min="0" max="1" step="0.05" value="0">
                </div>

                <div class="sim-speed">
                    <label class="label">Simulation Speed</label>
                    <input autocomplete="off" class="slider" type="range" id="stepsPerFrame" min="0" max="1" step="0.01" value="0.5">
                </div>

                <div class="bias">
                    <label class="label">Bias Direction</label>
                    <div class="bias-buttons">
                        <button class="active" id="biasNone">None</button>
                        <button id="biasLeft">←</button>
                        <button id="biasRight">→</button>
                        <button id="biasUp">↑</button>
                        <button id="biasDown">↓</button>
                    </div>
                    <label class="label" id="biasStrengthLabel">Bias Strength</label>
                    <input class="slider" type="range" id="biasSlider" min="0" max="0.25" step="0.01" value="0.08">
                </div>

                
                <div class="misc">
                    <label class="label">Miscellaneous</label>
                    <div class="misc-buttons">
                        <button class="toggle" id="showWalker">Show Particle Paths</button>
                        <button class="toggle" id="pauseButton">Pause</button>
                        <button id="resetButton">Reset</button>
                    </div>
                </div>  
            </div>

            <div class="canvas-area">
                <h2 class="canvas-title">Simulation</h2>
                <div class="canvas-layers">
                    <canvas id="canvas_cluster" width="800" height="600"></canvas>
                    <canvas id="canvas_path" width="800" height="600"></canvas>

                    <div class="counters">
                        <span class="label">Total Particle Count: </span> <span id="N" style="color: rgb(255, 47, 255)">0</span><br>
                        <span class="label">Stuck Particle Count: </span> <span id="NStuck" style="color: rgb(255, 47, 255)">0</span><br>
                        <span class="label">% Particles Stuck:  </span> <span id="Ratio" style="color: rgb(255, 47, 255)">0</span><span style="color: rgb(255, 47, 255); font-weight: bold">%</span>
                    </div>
                </div>
            </div>
        </div>

        <script src="main.js"></script>

    </body>
    
</html>
