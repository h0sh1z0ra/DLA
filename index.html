<!DOCTYPE html>
<html lang="en">
    <head>
        <title>DLA</title>

        <meta charset="utf-8">
        <meta name="author" content="h0sh1z0ra">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="img/ico.png" type="image/x-icon">

        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>
        <h1>Diffusion-Limited Aggregation</h1>
        
        <div class="app">
            <div class="controls">
                <h2>Controls</h2>
                <div class="prob">
                    <label class="label">Nearest Sticking Prob.: <span class="slider-label" id="pnnValue">1</span></label>
                    <input autocomplete="off" class="slider" type="range" id="pnnSlider" min="0" max="1" step="0.05" value="1">

                    <label class="label">Second Nearest Sticking Prob.: <span class="slider-label" id="psnnValue">0</span></label>
                    <input autocomplete="off" class="slider" type="range" id="psnnSlider" min="0" max="1" step="0.05" value="0">
                </div>

                <div class="sim-speed">
                    <label class="label">Simulation Speed</label>
                    <input autocomplete="off" class="slider" type="range" id="stepsPerFrame" min="0" max="1" step="0.01" value="0.5">
                </div>

                <div class="bias">
                    <label class="label">Bias Direction</label>
                    <div class="bias-buttons">
                        <button class="active" id="biasNone">None</button>
                        <button id="biasLeft">←</button>
                        <button id="biasRight">→</button>
                        <button id="biasUp">↑</button>
                        <button id="biasDown">↓</button>
                    </div>
                    <label class="label" id="biasStrengthLabel">Bias Strength</label>
                    <input class="slider" type="range" id="biasSlider" min="0" max="0.25" step="0.01" value="0.08">
                </div>

                
                <div class="misc">
                    <label class="label">Miscellaneous</label>
                    <div class="misc-buttons">
                        <button class="toggle" id="showWalker">Show Particle Paths</button>
                        <button class="toggle" id="pauseButton">Pause</button>
                        <button id="resetButton">Reset</button>
                    </div>
                </div>  
                <img class="bethly" src="img/bethly.png">
            </div>

            <div class="canvas-area">
                <h2 class="canvas-title">Simulation</h2>
                <div class="canvas-layers">
                    <canvas id="canvas_cluster" width="800" height="600"></canvas>
                    <canvas id="canvas_path" width="800" height="600"></canvas>

                    <div class="counters">
                        <span class="label">Total Particle Count: </span> <span id="N" style="color: rgb(13, 6, 6)">0</span><br>
                        <span class="label">Stuck Particle Count: </span> <span id="NStuck" style="color: rgb(13, 6, 6)">0</span><br>
                        <span class="label">% Particles Stuck:  </span> <span id="Ratio" style="color: rgb(13, 6, 6)">0</span><span style="color: rgb(13, 6, 6); font-weight: bold">%</span>
                    </div>
                </div>
            </div>
        </div>

        <script src="main.js"></script>

    </body>
    
</html>
